<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ReconJT - Error</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/recon.css') }}" rel="stylesheet">
</head>
<body class="bg-recon">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('recon_home') }}">
        <span class="recon-logo" aria-hidden="true">🛡️</span>
        <span>ReconJT</span>
      </a>
      <div class="ms-auto">
        <a class="btn btn-outline-light btn-sm" href="{{ url_for('recon_home') }}">Home</a>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card recon-glass border-0">
          <div class="card-body p-4 p-md-5">
            <h1 class="h3">Something went wrong</h1>
            <p class="text-white-50">{{ message }}</p>
            <a class="btn btn-primary" href="{{ url_for('recon_home') }}">Search Again</a>
          </div>
        </div>
      </div>
    </div>

</html>
